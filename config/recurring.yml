production:
  scheduled_push_job:
    class: ScheduledPushJob
    schedule: "30 1 * * *"   # 毎日9時（UTC）= 日本時間18時
    queue: default

development:
  scheduled_push_job:
    class: ScheduledPushJob
    schedule: "* */3 * * *"   # 動作確認用：毎分実行
    queue: default